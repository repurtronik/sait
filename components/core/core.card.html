<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="../../styles.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin: 0; font-family: var(--font-sans); background: var(--cx-frost); color: var(--cx-tx); }
  #root { padding: 28px 32px; }
  .row { display: flex; flex-wrap: wrap; gap: 12px; align-items: center; margin-bottom: 12px; }
  .group { margin-bottom: 26px; }
  .glabel { font-size: 0.65rem; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--cx-tm); margin-bottom: 12px; }
  .dark { background: var(--cx-navy); border-radius: 12px; padding: 18px 20px; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { Button, Badge, Tag, Card, Input, Stat, SectionHeading } = window.CORTEXDesignSystem_78fec2;

function Demo() {
  return (
    <div>
      <div className="group">
        <div className="glabel">Buttons</div>
        <div className="row">
          <Button variant="cyan">Skatīt produktus →</Button>
          <Button variant="primary">Sūtīt</Button>
          <Button variant="secondary">Lejuplādēt</Button>
          <Button variant="cyan" size="sm">Maza</Button>
          <Button variant="cyan" disabled>Disabled</Button>
        </div>
        <div className="row dark">
          <Button variant="outline">Sazināties</Button>
          <Button variant="ghost">Vairāk</Button>
          <Button variant="white">Lejuplādēt PDF</Button>
        </div>
      </div>

      <div className="group">
        <div className="glabel">Badges &amp; Tags</div>
        <div className="row">
          <Badge tone="cyan">Populārs</Badge>
          <Badge tone="sky">Dual SIM · 4G</Badge>
          <Badge tone="indigo">UHF/VHF</Badge>
          <Badge tone="danger">Trauksme</Badge>
          <Badge tone="success">Tiešsaistē</Badge>
        </div>
        <div className="row">
          <Tag>GSM/LTE</Tag><Tag>4G</Tag><Tag>Paradox/NX/DSC</Tag><Tag>−40…+85°C</Tag><Tag>Dual SIM</Tag>
        </div>
      </div>

      <div className="group">
        <div className="glabel">Stats</div>
        <div className="row" style={{gap: '40px'}}>
          <Stat value="25+" label="Gadi tirgū" align="left" />
          <Stat value="10 000+" label="Objekti" align="left" />
          <Stat value="24/7" label="Atbalsts" align="left" />
        </div>
      </div>

      <div className="row" style={{gap: '24px', alignItems: 'stretch'}}>
        <div style={{flex: '1 1 300px'}}>
          <div className="glabel">Input</div>
          <Input label="E-pasts" type="email" placeholder="example@cortex.lv" />
          <Input label="Tālrunis" defaultValue="+371 6" error="Lūdzu ievadiet derīgu numuru" />
        </div>
        <div style={{flex: '1 1 300px'}}>
          <div className="glabel">Card + SectionHeading</div>
          <Card padding="22px">
            <SectionHeading label="Risinājumi" title="Globālais monitorings" subtitle="Tūkstošiem objektu vienā sistēmā." />
          </Card>
        </div>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<Demo />);
</script>
</body>
</html>
