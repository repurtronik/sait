<!-- @dsCard group="Spacing" viewport="700x160" name="Spacing scale" subtitle="8-pt base · 4→84px" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-sans);background:#fff;padding:24px 28px}
  .row{display:flex;align-items:flex-end;gap:16px}
  .item{text-align:center}
  .bar{background:var(--cx-cyan);border-radius:3px;width:26px}
  .v{font-family:var(--font-mono);font-size:.6rem;color:var(--cx-tm);margin-top:6px}
  .k{font-size:.62rem;font-weight:700;color:var(--cx-navy);margin-top:2px}
</style></head>
<body><div class="row">
  <div class="item"><div class="bar" style="height:4px"></div><div class="v">4</div><div class="k">xs</div></div>
  <div class="item"><div class="bar" style="height:8px"></div><div class="v">8</div><div class="k">sm</div></div>
  <div class="item"><div class="bar" style="height:16px"></div><div class="v">16</div><div class="k">md</div></div>
  <div class="item"><div class="bar" style="height:24px"></div><div class="v">24</div><div class="k">lg</div></div>
  <div class="item"><div class="bar" style="height:32px"></div><div class="v">32</div><div class="k">xl</div></div>
  <div class="item"><div class="bar" style="height:48px"></div><div class="v">48</div><div class="k">2xl</div></div>
  <div class="item"><div class="bar" style="height:64px"></div><div class="v">64</div><div class="k">3xl</div></div>
  <div class="item"><div class="bar" style="height:84px"></div><div class="v">84</div><div class="k">4xl</div></div>
</div></body></html>
