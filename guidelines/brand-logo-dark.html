<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-sans);background:var(--cx-navy);display:flex;align-items:center;gap:48px;padding:30px 36px}
  img{height:64px;width:auto;filter:brightness(0) invert(1) opacity(.9)}
  .note{font-size:.78rem;color:rgba(255,255,255,.6);line-height:1.7;max-width:300px}
  .note b{color:#fff}
</style></head>
<body>
  <img src="../assets/logo.png" alt="CORTEX">
  <div class="note">On navy / hero / footer surfaces the mark is knocked out to <b>white</b> via <code style="font-family:var(--font-mono);font-size:.72rem">brightness(0) invert(1)</code> at ~90% opacity. Maintain contrast; avoid placing over busy imagery without a scrim.</div>
</body></html>
