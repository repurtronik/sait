<!-- @dsCard group="Colors" viewport="700x150" name="Neutrals & text" subtitle="frost · ice · borders · text" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-sans);background:#fff}
  .wrap{display:grid;grid-template-columns:repeat(6,1fr);gap:0;padding:18px}
  .sw{height:96px;border-radius:10px;display:flex;flex-direction:column;justify-content:flex-end;padding:10px;margin:0 4px;border:1px solid var(--cx-bd2)}
  .n{font-size:.7rem;font-weight:700;color:var(--cx-tx)}
  .h{font-family:var(--font-mono);font-size:.6rem;color:var(--cx-tm);margin-top:2px}
</style></head>
<body><div class="wrap">
  <div class="sw" style="background:var(--cx-frost)"><span class="n">Frost</span><span class="h">#F0F8FF</span></div>
  <div class="sw" style="background:var(--cx-ice)"><span class="n">Ice</span><span class="h">#E3F2FD</span></div>
  <div class="sw" style="background:var(--cx-bd)"><span class="n">Border</span><span class="h">#BBDEFB</span></div>
  <div class="sw" style="background:var(--cx-bd2)"><span class="n">Hairline</span><span class="h">#E1F0FB</span></div>
  <div class="sw" style="background:var(--cx-tx)"><span class="n" style="color:#fff">Text</span><span class="h" style="color:rgba(255,255,255,.7)">#1A1A2E</span></div>
  <div class="sw" style="background:var(--cx-tm)"><span class="n" style="color:#fff">Muted</span><span class="h" style="color:rgba(255,255,255,.8)">#546E7A</span></div>
</div></body></html>
