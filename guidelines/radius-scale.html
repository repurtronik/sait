<!-- @dsCard group="Spacing" viewport="700x170" name="Radius scale" subtitle="4 · 8 · 12 · 16 · 22 · full" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-sans);background:#fff;padding:24px 28px}
  .row{display:flex;gap:18px;align-items:flex-start}
  .item{text-align:center}
  .box{width:74px;height:74px;background:var(--cx-ice);border:1.5px solid var(--cx-bd)}
  .k{font-size:.66rem;font-weight:700;color:var(--cx-navy);margin-top:8px}
  .v{font-family:var(--font-mono);font-size:.6rem;color:var(--cx-tm);margin-top:2px}
</style></head>
<body><div class="row">
  <div class="item"><div class="box" style="border-radius:4px"></div><div class="k">sm</div><div class="v">4px</div></div>
  <div class="item"><div class="box" style="border-radius:8px"></div><div class="k">md</div><div class="v">8px</div></div>
  <div class="item"><div class="box" style="border-radius:12px"></div><div class="k">lg</div><div class="v">12px</div></div>
  <div class="item"><div class="box" style="border-radius:16px"></div><div class="k">xl</div><div class="v">16px</div></div>
  <div class="item"><div class="box" style="border-radius:22px"></div><div class="k">2xl</div><div class="v">22px</div></div>
  <div class="item"><div class="box" style="border-radius:9999px"></div><div class="k">full</div><div class="v">pill</div></div>
</div></body></html>
