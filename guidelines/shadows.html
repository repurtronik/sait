<!-- @dsCard group="Spacing" viewport="700x190" name="Shadows" subtitle="Cool navy-tinted elevation + cyan glow" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-sans);background:#fff;padding:28px}
  .row{display:flex;gap:24px;align-items:center;flex-wrap:wrap}
  .item{text-align:center}
  .box{width:96px;height:60px;background:#fff;border-radius:12px;border:1px solid var(--cx-bd2)}
  .k{font-size:.64rem;font-weight:700;color:var(--cx-navy);margin-top:12px}
</style></head>
<body><div class="row">
  <div class="item"><div class="box" style="box-shadow:var(--shadow-sm)"></div><div class="k">sm</div></div>
  <div class="item"><div class="box" style="box-shadow:var(--shadow-md)"></div><div class="k">md</div></div>
  <div class="item"><div class="box" style="box-shadow:var(--shadow-lg)"></div><div class="k">lg</div></div>
  <div class="item"><div class="box" style="box-shadow:var(--shadow-xl)"></div><div class="k">xl</div></div>
  <div class="item"><div class="box" style="box-shadow:var(--shadow-cyan)"></div><div class="k">cyan glow</div></div>
</div></body></html>
