<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-sans);background:#fff;color:var(--cx-tx);padding:24px 28px}
  p{margin:0 0 12px;max-width:560px}
  .lead{font-size:1.125rem;line-height:1.72;color:var(--cx-tm)}
  .body{font-size:.92rem;line-height:1.6}
  .cap{font-size:.82rem;color:var(--cx-tm)}
  .tag{display:inline-block;font-family:var(--font-mono);font-size:.62rem;color:var(--cx-tm);background:var(--cx-frost);border:1px solid var(--cx-bd2);padding:1px 6px;border-radius:4px;margin-left:6px;vertical-align:middle}

<body>
  <p class="lead">CORTEX iekārtas aizsargā tūkstošiem objektu visā Baltijā.<span class="tag">lg · 1.125rem · 400</span></p>
  <p class="body">Raidītāji, paneļi un Defendex platforma — pilns cikls no uzstādīšanas līdz centralizētam monitoringam reāllaikā.<span class="tag">base · 0.92rem · 400</span></p>
  <p class="cap">Ražots Latvijā kopš 1992. gada.<span class="tag">sm · 0.82rem</span></p>
</body></html>
