<!-- @dsCard group="Colors" viewport="700x150" name="Semantic & accent" subtitle="success · warning · danger · green dot" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-sans);background:#fff}
  .wrap{display:grid;grid-template-columns:repeat(4,1fr);gap:0;padding:18px}
  .sw{height:96px;border-radius:10px;display:flex;flex-direction:column;justify-content:flex-end;padding:12px;color:#fff;margin:0 6px}
  .n{font-size:.78rem;font-weight:700}
  .h{font-family:var(--font-mono);font-size:.66rem;opacity:.85;margin-top:2px}
</style></head>
<body><div class="wrap">
  <div class="sw" style="background:var(--cx-success)"><span class="n">Success</span><span class="h">#2E7D32</span></div>
  <div class="sw" style="background:var(--cx-warning)"><span class="n">Warning</span><span class="h">#D97706</span></div>
  <div class="sw" style="background:var(--cx-danger)"><span class="n">Danger</span><span class="h">#DC2626</span></div>
  <div class="sw" style="background:var(--cx-green)"><span class="n">Logo green</span><span class="h">#1FA637</span></div>
</div></body></html>
