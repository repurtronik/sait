<!-- @dsCard group="Colors" viewport="700x150" name="Brand blue scale" subtitle="navy · blue · sky · cyan" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8">
<link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-sans);background:#fff}
  .wrap{display:grid;grid-template-columns:repeat(4,1fr);gap:0;padding:18px}
  .sw{height:96px;border-radius:10px;display:flex;flex-direction:column;justify-content:flex-end;padding:12px;color:#fff;margin:0 6px}
  .n{font-size:.78rem;font-weight:700;letter-spacing:.01em}
  .h{font-family:var(--font-mono);font-size:.66rem;opacity:.8;margin-top:2px}
</style></head>
<body><div class="wrap">
  <div class="sw" style="background:var(--cx-navy)"><span class="n">Navy</span><span class="h">#0F2D52</span></div>
  <div class="sw" style="background:var(--cx-blue)"><span class="n">Blue</span><span class="h">#1565C0</span></div>
  <div class="sw" style="background:var(--cx-sky)"><span class="n">Sky</span><span class="h">#2196F3</span></div>
  <div class="sw" style="background:var(--cx-cyan);color:var(--cx-navy)"><span class="n">Cyan</span><span class="h">#00B4D8</span></div>
</div></body></html>
