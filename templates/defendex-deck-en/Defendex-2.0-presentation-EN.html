  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

p style=\"font-size:34px;line-height:1.5;color:rgba(255,255,255,.66);max-width:880px;margin:0 0 56px\">Security monitoring in your pocket — object status, control and alarms in real time. Anywhere. Anytime.<\u002Fp>\n    <div style=\"display:flex;gap:16px\">\n      <span style=\"font-size:24px;font-weight:600;color:rgba(255,255,255,.5);border:1px solid rgba(255,255,255,.16);padding:12px 26px;border-radius:10px\">Android<\u002Fspan>\n      <span style=\"font-size:24px;font-weight:600;color:rgba(255,255,255,.5);border:1px solid rgba(255,255,255,.16);padding:12px 26px;border-radius:10px\">iOS<\u002Fspan>\n      <span style=\"font-size:24px;font-weight:600;color:rgba(255,255,255,.5);border:1px solid rgba(255,255,255,.16);padding:12px 26px;border-radius:10px\">Web<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div style=\"position:relative;z-index:1;width:620px;display:flex;justify-content:center;align-items:center\">\n    <img src=\"70c00ca7-05c1-4498-b75e-a60e873349e5\" alt=\"Defendex login\" style=\"height:860px;width:auto;border-radius:46px;border:10px solid rgba(255,255,255,.14);box-shadow:0 50px 120px rgba(0,0,0,.55)\">\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"Problēma\" data-screen-label=\"02 Problēma\" style=\"position:relative;width:100%;height:100%;box-sizing:border-box;overflow:hidden;background:#fff;font-family:'Outfit',sans-serif;color:#1A1A2E;padding:120px 140px;display:flex;flex-direction:column\">\n  <div style=\"font-size:24px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:#2196F3;margin-bottom:22px\">The problem<\u002Fdiv>\n  <h2 style=\"font-size:68px;font-weight:800;letter-spacing:-.02em;line-height:1.08;margin:0 0 18px;max-width:1200px\">Object security without<br>transparency or control<\u002Fh2>\n  <p style=\"font-size:30px;color:#546E7A;line-height:1.6;max-width:980px;margin:0 0 64px\">Traditional security leaves the owner in the dark: the signal reaches the monitoring station, but what happens on site stays invisible.<\u002Fp>\n  <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:32px;margin-top:auto\">\n    <div style=\"background:#F0F8FF;border:1.5px solid #E1F0FB;border-radius:20px;padding:44px\">\n      <div style=\"width:72px;height:72px;border-radius:18px;background:#0F2D52;display:flex;align-items:center;justify-content:center;margin-bottom:28px\"><svg width=\"34\" height=\"34\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#fff\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M9.88 9.88a3 3 0 1 0 4.24 4.24\"><\u002Fpath><path d=\"M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68\"><\u002Fpath><path d=\"M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61\"><\u002Fpath><line x1=\"2\" y1=\"2\" x2=\"22\" y2=\"22\"><\u002Fline><\u002Fsvg><\u002Fdiv>\n      <h3 style=\"font-size:32px;font-weight:700;color:#0F2D52;margin:0 0 12px\">No visible status<\u002Fh3>\n      <p style=\"font-size:24px;color:#546E7A;line-height:1.55;margin:0\">The owner has no idea whether the site is armed, disarmed or in alarm.<\u002Fp>\n    <\u002Fdiv>\n    <div style=\"background:#F0F8FF;border:1.5px solid #E1F0FB;border-radius:20px;padding:44px\">\n      <div style=\"width:72px;height:72px;border-radius:18px;background:#0F2D52;display:flex;align-items:center;justify-content:center;margin-bottom:28px\"><svg width=\"34\" height=\"34\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#fff\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"12\" cy=\"12\" r=\"10\"><\u002Fcircle><polyline points=\"12 6 12 12 16 14\"><\u002Fpolyline><\u002Fsvg><\u002Fdiv>\n      <h3 style=\"font-size:32px;font-weight:700;color:#0F2D52;margin:0 0 12px\">Slow response<\u002Fh3>\n      <p style=\"font-size:24px;color:#546E7A;line-height:1.55;margin:0\">Alarms are learned late — only after a call from the monitoring station.<\u002Fp>\n    <\u002Fdiv>\n    <div style=\"background:#F0F8FF;border:1.5px solid #E1F0FB;border-radius:20px;padding:44px\">\n      <div style=\"width:72px;height:72px;border-radius:18px;background:#0F2D52;display:flex;align-items:center;justify-content:center;margin-bottom:28px\"><svg width=\"34\" height=\"34\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#fff\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M3 3v18h18\"><\u002Fpath><path d=\"M18.7 8 13 13.7l-3-3L6 14.7\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n      <h3 style=\"font-size:32px;font-weight:700;color:#0F2D52;margin:0 0 12px\">No history<\u002Fh3>\n      <p style=\"font-size:24px;color:#546E7A;line-height:1.55;margin:0\">Events aren’t available to the owner — no reports, no transparency.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section data-label=\"Risinājums\" data-screen-label=\"03 Risinājums\" style=\"position:relative;width:100%;height:100%;box-sizing:border-box;overflow:hidden;background:#F0F8FF;font-family:'Outfit',sans-serif;color:#1A1A2E;padding:120px 140px;display:flex;flex-direction:column\">\n  <div style=\"font-size:24px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:#2196F3;margin-bottom:22px\">The solution<\u002Fdiv>\n  <h2 style=\"font-size:68px;font-weight:800;letter-spacing:-.02em;line-height:1.08;margin:0 0 18px;max-width:1200px\">Defendex 2.0 — one platform for everything<\u002Fh2>\n  <p style=\"font-size:30px;color:#546E7A;line-height:1.6;max-width:1040px;margin:0 0 60px\">CORTEX hardware, cloud server and app work together: from a signal on site to a notification on your phone — in real time.<\u002Fp>\n  <div style=\"display:grid;grid-template-columns:repeat(4,1fr);gap:26px;margin-top:auto\">\n    <div style=\"background:#fff;border:1.5px solid #E1F0FB;border-radius:20px;padding:40px 34px;box-shadow:0 2px 16px rgba(15,45,82,.06)\">\n      <div style=\"width:64px;height:64px;border-radius:16px;background:rgba(0,180,216,.12);border:1.5px solid rgba(0,180,216,.3);display:flex;align-item
